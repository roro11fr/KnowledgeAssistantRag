<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream:      #faf8f3;
      --paper:      #ffffff;
      --sand:       #f0ece2;
      --border:     #e2ddd3;
      --text:       #2c2825;
      --muted:      #9e9890;
      --accent:     #b5651d;
      --accent-lt:  #f5ede4;
      --accent-dk:  #9a5016;
      --green:      #2d6a4f;
      --green-lt:   #e8f4ef;
      --amber:      #b07d00;
      --amber-lt:   #fff8e1;
      --red:        #c0392b;
      --red-lt:     #fdecea;
      --radius:     12px;
      --shadow:     0 2px 16px rgba(44,40,37,0.08);
      --shadow-md:  0 4px 24px rgba(44,40,37,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .brand h1 {
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
    }

    .brand p {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 1px;
    }

    #status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.76rem;
      color: var(--muted);
      background: var(--sand);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.28rem 0.75rem;
    }

    #status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.4s;
    }
    #status-dot.ready { background: var(--green); box-shadow: 0 0 5px rgba(45,106,79,0.4); }
    #status-dot.error { background: var(--red); }

    /* ── Layout ── */
    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 6rem;
    }

    /* ── Search card ── */
    .search-card {
      background: var(--paper);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.8rem;
      margin-bottom: 1.5rem;
    }

    .search-card h2 {
      font-family: 'Lora', serif;
      font-size: 1.35rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .search-card .lead {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.1rem;
    }

    .search-row {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    textarea#question {
      flex: 1;
      padding: 0.82rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.96rem;
      color: var(--text);
      background: var(--cream);
      resize: none;
      outline: none;
      line-height: 1.5;
      min-height: 50px;
      max-height: 160px;
      overflow-y: auto;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea#question:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-lt);
      background: var(--paper);
    }

    textarea#question::placeholder { color: #c0bbb3; }

    button#ask-btn {
      padding: 0.72rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.93rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    button#ask-btn:hover   { background: var(--accent-dk); }
    button#ask-btn:active  { transform: scale(0.98); }
    button#ask-btn:disabled { background: #d4b896; cursor: not-allowed; transform: none; }

    /* ── Example chips ── */
    .example-chips {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.4rem;
    }

    .chip-label {
      font-size: 0.76rem;
      color: var(--muted);
      margin-right: 0.1rem;
    }

    .example-chip {
      padding: 0.3rem 0.75rem;
      background: var(--sand);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.76rem;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .example-chip:hover {
      background: var(--accent-lt);
      border-color: #e8cdb8;
      color: var(--accent);
    }

    /* ── Loading ── */
    #loader {
      display: none;
      align-items: center;
      gap: 1rem;
      padding: 1.4rem 1.8rem;
      background: var(--paper);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 1.5rem;
    }

    .dots span {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    #loader-text { font-size: 0.9rem; color: var(--muted); }

    /* ── Error ── */
    #error-msg {
      display: none;
      background: var(--red-lt);
      border: 1px solid #f5c6c2;
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      font-size: 0.9rem;
      color: var(--red);
      margin-bottom: 1.5rem;
    }

    /* ── Answer card ── */
    #answer-card {
      display: none;
      animation: fadeUp 0.3s ease both;
      margin-bottom: 1.5rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .answer-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .answer-badge {
      background: var(--green-lt);
      color: var(--green);
      border-radius: 6px;
      padding: 0.25rem 0.7rem;
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .confidence-badge {
      font-size: 0.74rem;
      font-weight: 600;
      border-radius: 6px;
      padding: 0.25rem 0.65rem;
    }

    .confidence-High   { background: var(--green-lt);  color: var(--green); }
    .confidence-Medium { background: var(--amber-lt);  color: var(--amber); }
    .confidence-Low    { background: var(--sand);       color: var(--muted); }

    .answer-body {
      background: var(--paper);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.6rem 1.8rem;
    }

    /* ── Structured answer sections ── */
    #answer-text {
      font-family: 'Nunito', sans-serif;
      font-size: 0.97rem;
      line-height: 1.75;
      color: var(--text);
    }

    .ans-section { margin-bottom: 1.1rem; }
    .ans-section:last-child { margin-bottom: 0; }

    .ans-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--accent);
      margin-bottom: 0.45rem;
    }

    .ans-para {
      margin-bottom: 0.6rem;
      line-height: 1.75;
    }
    .ans-para:last-child { margin-bottom: 0; }

    .ans-list {
      padding-left: 1.3rem;
      margin: 0;
    }

    .ans-list li {
      margin-bottom: 0.4rem;
      line-height: 1.65;
    }

    .ans-steps {
      padding-left: 1.4rem;
      margin: 0;
      counter-reset: step-counter;
      list-style: none;
    }

    .ans-steps li {
      margin-bottom: 0.55rem;
      line-height: 1.65;
      position: relative;
      padding-left: 0.2rem;
      counter-increment: step-counter;
    }

    .ans-steps li::before {
      content: counter(step-counter);
      position: absolute;
      left: -1.6rem;
      top: 0.05em;
      width: 1.3rem;
      height: 1.3rem;
      background: var(--accent-lt);
      color: var(--accent);
      border-radius: 50%;
      font-size: 0.72rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Inline page citation link */
    a.page-ref {
      color: var(--accent);
      font-size: 0.83em;
      font-weight: 600;
      text-decoration: none;
      background: var(--accent-lt);
      border-radius: 3px;
      padding: 0 4px;
    }
    a.page-ref:hover { background: #ebd5c2; text-decoration: underline; }

    /* Keyword highlight */
    mark.hl {
      background: #fff3b0;
      color: inherit;
      border-radius: 2px;
      padding: 0 2px;
    }

    /* ── Sources section ── */
    #sources-section {
      display: none;
      animation: fadeUp 0.4s ease 0.1s both;
    }

    .sources-header {
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.8rem;
    }

    .source-card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.3rem;
      margin-bottom: 0.7rem;
      transition: box-shadow 0.2s;
    }

    .source-card:hover { box-shadow: var(--shadow); }

    .source-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }

    .file-badge {
      font-size: 0.65rem;
      font-weight: 700;
      background: var(--sand);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.15rem 0.45rem;
      color: var(--muted);
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }

    .source-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    a.page-badge {
      margin-left: auto;
      font-size: 0.73rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-lt);
      border: 1px solid #e8cdb8;
      border-radius: 5px;
      padding: 0.18rem 0.55rem;
      white-space: nowrap;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    a.page-badge:hover { background: #ebd5c2; }

    .source-excerpt {
      font-size: 0.86rem;
      color: #5a544e;
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .source-card.expanded .source-excerpt {
      display: block;
      overflow: visible;
    }

    .expand-btn {
      margin-top: 0.45rem;
      background: none;
      border: none;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      font-family: 'Nunito', sans-serif;
    }
    .expand-btn:hover { text-decoration: underline; }

    /* ── Soft-match notice ── */
    .soft-match-notice {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      background: var(--amber-lt);
      border: 1px solid #f0e0a0;
      border-radius: var(--radius);
      padding: 0.9rem 1.1rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: var(--amber);
    }

    /* ── Empty state ── */
    .hint-text {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 3rem 0;
    }
    .hint-text .icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .search-row { flex-direction: column; align-items: stretch; }
      button#ask-btn { width: 100%; }
      header { padding: 1rem; }
      #status-pill { display: none; }
      .example-chips { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">📄</div>
    <div class="brand">
      <h1>Knowledge Assistant</h1>
      <p>Powered by your documentation</p>
    </div>
    <div id="status-pill">
      <span id="status-dot"></span>
      <span id="status-text">Loading...</span>
    </div>
  </header>

  <div class="page">

    <div class="search-card">
      <h2>What would you like to know?</h2>
      <p class="lead">Ask any question — the assistant will find the answer directly from your documents.</p>
      <div class="search-row">
        <textarea id="question" placeholder="e.g. How do I replace the filter? Why is suction weak?" rows="2"></textarea>
        <button id="ask-btn">Search</button>
      </div>
      <div class="example-chips">
        <span class="chip-label">Try:</span>
        <button class="example-chip" onclick="setQuestion('How do I clean the HEPA filter?')">How do I clean the HEPA filter?</button>
        <button class="example-chip" onclick="setQuestion('Why is suction power weak?')">Why is suction power weak?</button>
        <button class="example-chip" onclick="setQuestion('How do I empty the dust container?')">How do I empty the dust container?</button>
      </div>
    </div>

    <div id="loader">
      <div class="dots"><span></span><span></span><span></span></div>
      <span id="loader-text">Looking through your documents...</span>
    </div>

    <div id="error-msg"></div>

    <div id="answer-card">
      <div class="answer-meta">
        <span class="answer-badge">Answer</span>
        <span id="confidence-badge" class="confidence-badge"></span>
      </div>
      <div class="answer-body">
        <div id="answer-text"></div>
      </div>
    </div>

    <div id="sources-section">
      <p class="sources-header">Document sections used</p>
      <div id="soft-match-notice"></div>
      <div id="source-list"></div>
    </div>

    <div id="empty-hint" class="hint-text">
      <span class="icon">🔍</span>
      Type your question above and press <strong>Search</strong>
    </div>

  </div>

  <script>
    const API = 'http://localhost:8000';

    const statusDot       = document.getElementById('status-dot');
    const statusText      = document.getElementById('status-text');
    const askBtn          = document.getElementById('ask-btn');
    const questionEl      = document.getElementById('question');
    const loader          = document.getElementById('loader');
    const loaderText      = document.getElementById('loader-text');
    const errorMsg        = document.getElementById('error-msg');
    const answerCard      = document.getElementById('answer-card');
    const answerText      = document.getElementById('answer-text');
    const confidenceBadge = document.getElementById('confidence-badge');
    const sourcesSection  = document.getElementById('sources-section');
    const softNotice      = document.getElementById('soft-match-notice');
    const sourceList      = document.getElementById('source-list');
    const emptyHint       = document.getElementById('empty-hint');

    // ── Auto-grow textarea ─────────────────────────────────────────────────
    questionEl.addEventListener('input', () => {
      questionEl.style.height = 'auto';
      questionEl.style.height = Math.min(questionEl.scrollHeight, 160) + 'px';
    });

    // Submit on Enter (not Shift+Enter)
    questionEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askBtn.click(); }
    });

    // Fill example query and submit
    function setQuestion(text) {
      questionEl.value = text;
      questionEl.style.height = 'auto';
      questionEl.style.height = Math.min(questionEl.scrollHeight, 160) + 'px';
      askBtn.click();
    }

    // ── Status check ───────────────────────────────────────────────────────
    async function checkStatus() {
      try {
        const res  = await fetch(`${API}/status`);
        const data = await res.json();
        if (data.status === 'ready') {
          statusDot.className = 'ready';
          statusText.textContent = `Ready · ${data.indexed_chunks} sections`;
        } else {
          statusDot.className = 'error';
          statusText.textContent = 'No documents loaded';
        }
      } catch {
        statusDot.className = 'error';
        statusText.textContent = 'Offline';
      }
    }

    checkStatus();

    // ── Helpers ────────────────────────────────────────────────────────────

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const STOP = new Set([
      'a','an','the','is','are','was','were','be','been','being','have','has',
      'had','do','does','did','will','would','could','should','may','might',
      'i','you','he','she','it','we','they','what','which','who','this','that',
      'these','those','or','and','but','if','in','on','at','to','for','of',
      'with','by','from','about','how','why','when','where','not','no','its',
    ]);

    function keywords(q) {
      return [...new Set(q.toLowerCase().split(/\W+/).filter(w => w.length > 2 && !STOP.has(w)))];
    }

    /** Escape then highlight keywords with <mark class="hl">. */
    function hl(text, kw) {
      if (!kw.length) return escapeHtml(text);
      const safe = escapeHtml(text);
      const pat = new RegExp('(' + kw.map(w => w.replace(/[.*+?^${}()|[\]\\]/g,'\\'+'$&')).join('|') + ')', 'gi');
      return safe.replace(pat, '<mark class="hl">$1</mark>');
    }

    /** Build PDF open URL: page jump + search term for exact-text highlighting. */
    function pdfUrl(docUrl, kw) {
      const base = `${API}${docUrl}`;
      const term = kw.slice(0, 3).join(' ');
      return term ? `${base}&search=${encodeURIComponent(term)}` : base;
    }

    /**
     * Render the LLM answer as structured HTML.
     * Handles: Problem/Possible causes/Recommended actions sections,
     * numbered step lists, and plain paragraphs.
     * Converts (page N) into clickable links and highlights keywords.
     */
    function renderAnswer(text, pageUrls, kw) {

      function linkPages(html) {
        return html.replace(/\(page (\d+)\)/g, (_, n) => {
          const url = pageUrls[+n];
          return url
            ? `(<a class="page-ref" href="${url}" target="_blank">page ${n}</a>)`
            : `(page ${n})`;
        });
      }

      function processText(raw) {
        return linkPages(hl(raw, kw));
      }

      const lines   = text.split('\n');
      const SECTION = /^(Problem|Possible causes|Recommended actions)\s*:\s*$/i;
      const BULLET  = /^-\s+(.+)/;
      const NUMBERED = /^\d+\.\s+(.+)/;

      // Detect structured troubleshooting format
      const isStructured = lines.some(l => SECTION.test(l.trim()));

      if (isStructured) {
        let html       = '';
        let currentLabel = null;
        let listTag    = null;
        let listOpen   = false;

        const closeList = () => {
          if (listOpen) { html += `</${listTag}>`; listOpen = false; }
        };

        for (const raw of lines) {
          const line = raw.trim();
          if (!line) continue;

          const sectionMatch = line.match(/^(Problem|Possible causes|Recommended actions)\s*:/i);
          if (sectionMatch) {
            closeList();
            if (currentLabel) html += '</div>';
            currentLabel = sectionMatch[1];
            const isActions = /action/i.test(currentLabel);
            listTag = isActions ? 'ol' : 'ul';
            html += `<div class="ans-section"><div class="ans-label">${escapeHtml(currentLabel)}</div>`;
            continue;
          }

          const bulletMatch = line.match(BULLET);
          if (bulletMatch) {
            if (!listOpen) { html += `<${listTag} class="ans-list">`;  listOpen = true; }
            html += `<li>${processText(bulletMatch[1])}</li>`;
            continue;
          }

          const numMatch = line.match(NUMBERED);
          if (numMatch && listTag === 'ol') {
            if (!listOpen) { html += `<ol class="ans-list">`; listOpen = true; }
            html += `<li>${processText(numMatch[1])}</li>`;
            continue;
          }

          closeList();
          html += `<p class="ans-para">${processText(line)}</p>`;
        }

        closeList();
        if (currentLabel) html += '</div>';
        return html;
      }

      // Numbered how-to steps
      if (lines.some(l => NUMBERED.test(l.trim()))) {
        let html   = '';
        let inList = false;

        for (const raw of lines) {
          const line = raw.trim();
          if (!line) continue;
          const m = line.match(NUMBERED);
          if (m) {
            if (!inList) { html += '<ol class="ans-steps">'; inList = true; }
            html += `<li>${processText(m[1])}</li>`;
          } else {
            if (inList) { html += '</ol>'; inList = false; }
            html += `<p class="ans-para">${processText(line)}</p>`;
          }
        }
        if (inList) html += '</ol>';
        return html;
      }

      // Plain paragraphs
      return text.trim().split(/\n{2,}/)
        .map(para => `<p class="ans-para">${processText(para.replace(/\n/g, ' '))}</p>`)
        .join('');
    }

    // ── Search ─────────────────────────────────────────────────────────────

    askBtn.addEventListener('click', async () => {
      const question = questionEl.value.trim();
      if (!question) return;

      const kw = keywords(question);

      askBtn.disabled = true;
      loader.style.display = 'flex';
      errorMsg.style.display = 'none';
      answerCard.style.display = 'none';
      sourcesSection.style.display = 'none';
      emptyHint.style.display = 'none';

      const loadingMsgs = [
        'Looking through your documents...',
        'Finding the most relevant sections...',
        'Preparing your answer...',
      ];
      let mi = 0;
      const msgTimer = setInterval(() => {
        mi = (mi + 1) % loadingMsgs.length;
        loaderText.textContent = loadingMsgs[mi];
      }, 1500);

      try {
        const res  = await fetch(`${API}/query`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, top_k: 5 }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Something went wrong. Please try again.');

        // Build page → URL map for inline citations
        const pageUrls = {};
        data.sources.forEach(s => {
          if (s.page && s.doc_url) pageUrls[s.page] = pdfUrl(s.doc_url, kw);
        });

        // Render answer
        answerText.innerHTML = renderAnswer(data.answer, pageUrls, kw);

        // Confidence badge
        const conf = data.confidence || 'Low';
        confidenceBadge.textContent = conf === 'High'   ? '✓ High confidence'
                                    : conf === 'Medium' ? '~ Partial match'
                                    :                     '↓ Limited match';
        confidenceBadge.className = `confidence-badge confidence-${conf}`;

        answerCard.style.display = 'block';

        // Soft-match notice for Low confidence
        softNotice.innerHTML = conf === 'Low'
          ? `<div class="soft-match-notice">⚠ I couldn't find an exact answer — showing the closest relevant sections from your documents.</div>`
          : '';

        // Top 3 unique sources by (filename + page)
        const seen = new Set();
        const top3 = data.sources.filter(s => {
          const key = `${s.source}:${s.page}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        }).slice(0, 3);

        sourceList.innerHTML = top3.map((s, i) => {
          const ext     = s.source.split('.').pop().toUpperCase();
          const excerpt = s.excerpt || '';
          const id      = `src-${i}`;
          const docName = s.source.replace(/\.[^.]+$/, '');
          const badgeHref = s.page && s.doc_url ? pdfUrl(s.doc_url, kw) : null;
          const pageBadge = badgeHref
            ? `<a class="page-badge" href="${badgeHref}" target="_blank" title="Open document at page ${s.page}">↗ Page ${s.page}</a>`
            : '';

          return `
            <div class="source-card" id="${id}">
              <div class="source-meta">
                <span class="file-badge">${ext}</span>
                <span class="source-name" title="${escapeHtml(s.source)}">${escapeHtml(docName)}</span>
                ${pageBadge}
              </div>
              <div class="source-excerpt">${hl(excerpt, kw)}</div>
              <button class="expand-btn" style="display:none">Show more</button>
            </div>`;
        }).join('');

        // Show expand button only when content is actually clamped
        sourceList.querySelectorAll('.source-card').forEach(card => {
          const excerpt = card.querySelector('.source-excerpt');
          const btn     = card.querySelector('.expand-btn');
          if (excerpt.scrollHeight > excerpt.clientHeight + 2) {
            btn.style.display = 'inline';
          }
        });

        sourcesSection.style.display = 'block';

      } catch (err) {
        errorMsg.textContent = '⚠ ' + err.message;
        errorMsg.style.display = 'block';
        emptyHint.style.display = 'block';
      } finally {
        clearInterval(msgTimer);
        askBtn.disabled = false;
        loader.style.display = 'none';
      }
    });

    // Event delegation for expand buttons — avoids global function binding issues
    sourceList.addEventListener('click', e => {
      const btn = e.target.closest('.expand-btn');
      if (!btn) return;
      const card     = btn.closest('.source-card');
      const expanded = card.classList.toggle('expanded');
      btn.textContent = expanded ? 'Show less' : 'Show more';
    });
  </script>
</body>
</html>
